name: Nexus Vanguard Daily Intel

on:
  schedule:
    # Esegue ogni giorno alle 06:00 UTC (07:00 Italia Inverno / 08:00 Estate)
    - cron: '0 6 * * *'
  workflow_dispatch: # Ci permette di testarlo manualmente subito con un bottone

jobs:
  run-mission:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installazione Dipendenze
        run: |
          pip install requests

      - name: Esecuzione Delivery Agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python delivery.py